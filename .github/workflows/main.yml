name: protonvpn
on:
  repository_dispatch:
    types: [protonvpn]
  workflow_dispatch:
jobs:
  protonvpn:
    name: vpngate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ${{secrets.protonvpn}}
      - run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add pvpn.zip
          git commit -m "Update pvpn.zip"
          git push origin main --force
